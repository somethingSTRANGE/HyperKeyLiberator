name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish service
        run: dotnet publish HyperKeyLiberatorService/HyperKeyLiberatorService.csproj -c Release -r win-x64 --self-contained

      - name: Publish helper
        run: dotnet publish HyperKeyLiberator/HyperKeyLiberator.csproj -c Release -r win-x64 --self-contained

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            HyperKeyLiberatorService/bin/Release/net10.0/win-x64/publish/HyperKeyLiberatorService.exe
            HyperKeyLiberator/bin/Release/net10.0/win-x64/publish/HyperKeyLiberator.exe